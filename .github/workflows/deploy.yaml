name: Test, Build, Push to ECR, Deploy to ECS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: ap-northeast-1
  ROLE_TO_ASSUME: arn:aws:iam::070938123165:role/GitHub_Actions

  ECR_REPOSITORY: operation_record_ecs

  ECS_CLUSTER: operation-record-cluster
  ECS_SERVICE: operation-record-task-service-s88uh1xa
  ECS_TASK_DEFINITION_FAMILY: operation-record-task
  CONTAINER_NAME: operation-record-container

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (for tests)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests (Maven Wrapper)
        run: |
          chmod +x mvnw
          ./mvnw -B test

  deploy:
    needs: test   # ← test が成功した場合のみ deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG=$(TZ=Asia/Tokyo date +'%Y-%m-%d-%H-%M-%S')
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Fetch current task definition (JSON)
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION_FAMILY}" \
            --query taskDefinition \
            --output json > task-definition.json

      - id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true